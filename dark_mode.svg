  <!-- About Me Section -->
  <text x="380" y="245" class="heading" font-size="18" fill="#E6EDF3">// About Me</text>

  <text x="380" y="275" class="code" font-size="13" fill="#ADBAC7">Bridging distributed backend systems,</text>
  <text x="380" y="295" class="code" font-size="13" fill="#ADBAC7">AI, and embedded hardware. Building</text>
  <text x="380" y="315" class="code" font-size="13" fill="#ADBAC7">reliable apps in Python, SQL &amp; DevOps.</text>
  <text x="380" y="335" class="code" font-size="13" fill="#ADBAC7">Passionate about clean code &amp; system</text>
  <text x="380" y="355" class="code" font-size="13" fill="#ADBAC7">resilience — understanding failure</text>
  <text x="380" y="375" class="code" font-size="13" fill="#ADBAC7">modes to build software that lasts.</text>

  <!-- Focus Section -->
  <text x="380" y="420" class="heading" font-size="18" fill="#E6EDF3">// Current Focus</text>

  <text x="380" y="450" class="code" font-size="13" fill="#ADBAC7">• Architecting cyber-physical systems</text>
  <text x="380" y="470" class="code" font-size="13" fill="#ADBAC7">  (Mechatronics + AI)</text>
  <text x="380" y="490" class="code" font-size="13" fill="#ADBAC7">• Designing scalable APIs &amp; microservices</text>
  <text x="380" y="510" class="code" font-size="13" fill="#ADBAC7">  with Python &amp; FastAPI</text>
  <text x="380" y="530" class="code" font-size="13" fill="#ADBAC7">• Integrating CV (YOLO, OpenCV) into</text>
  <text x="380" y="550" class="code" font-size="13" fill="#ADBAC7">  real-time environments</text>
  <text x="380" y="570" class="code" font-size="13" fill="#ADBAC7">• Researching app-layer security &amp;</text>
  <text x="380" y="590" class="code" font-size="13" fill="#ADBAC7">  defensive architecture</text>

